<!DOCTYPE html>
<html>
<head>
<title>Dhanak Society Registration</title>

<style>
body{
font-family: Arial;
background:#f2f4f8;
padding:30px;
}

.container{
max-width:700px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

.activity{
display:flex;
justify-content:space-between;
padding:8px;
}

.total{
font-size:18px;
font-weight:bold;
margin-top:10px;
}

button{
width:100%;
padding:12px;
background:#2a62ff;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1f4bd6;
}

</style>
</head>

<body>

<div class="container">

<h2>Dhanak Society Event Registration</h2>

<input id="name" placeholder="Name">
<input id="class" placeholder="Class">
<input id="roll" placeholder="Roll Number">
<input id="phone" placeholder="Phone Number">
<input id="gmail" placeholder="Gmail">

<h3>Select Competitions</h3>

<div class="activity">
<label><input type="checkbox" id="painting"> Painting</label>
<span>Rs 1000</span>
</div>

<div class="activity">
<label><input type="checkbox" id="sketching"> Sketching</label>
<span>Rs 300</span>
</div>

<div class="activity">
<label><input type="checkbox" id="crafting"> Crafting</label>
<span>Rs 600</span>
</div>

<div class="activity">
<label><input type="checkbox" id="calligraphy"> Calligraphy</label>
<span>Rs 500</span>
</div>

<div class="total">
Total Bill: Rs <span id="total">0</span>
</div>

<br>

<label>Upload Payment Screenshot</label>
<input type="file" id="proof">

<br><br>

<button onclick="submitForm()">Submit Registration</button>

<p id="status"></p>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbypaoIXRFW8UNptVBaWE41p6bpnsSs6XqTVXpiDKZ0DgGaX1FTI8qCd1dWxupvL9v3t/exec";

const prices={
painting:1000,
sketching:300,
crafting:600,
calligraphy:500
};

const checkboxes=["painting","sketching","crafting","calligraphy"];

checkboxes.forEach(id=>{
document.getElementById(id).addEventListener("change",updateTotal);
});

function updateTotal(){

let total=0;

checkboxes.forEach(id=>{
if(document.getElementById(id).checked){
total+=prices[id];
}
});

document.getElementById("total").innerText=total;

}

async function submitForm(){

const file=document.getElementById("proof").files[0];

if(!file){
alert("Upload payment proof");
return;
}

const reader=new FileReader();

reader.onload=async function(){

const payload={
name:document.getElementById("name").value,
className:document.getElementById("class").value,
rollNo:document.getElementById("roll").value,
phone:document.getElementById("phone").value,
gmail:document.getElementById("gmail").value,
painting:document.getElementById("painting").checked,
sketching:document.getElementById("sketching").checked,
crafting:document.getElementById("crafting").checked,
calligraphy:document.getElementById("calligraphy").checked,
total:document.getElementById("total").innerText,
proof:file.name,
fileData:reader.result
};

try{

await fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(payload)
});

document.getElementById("status").innerText="Registration Submitted Successfully";

}catch(e){

document.getElementById("status").innerText="Submit failed";

}

};

reader.readAsDataURL(file);

}

</script>

</body>
</html>
