<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Participation Form</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f6f7fb; margin:0; padding:20px; }
    .card { max-width: 820px; margin: auto; background:#fff; padding:20px; border-radius:14px; box-shadow:0 10px 25px rgba(0,0,0,.08); }
    h1 { margin:0 0 10px; }
    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:12px; }
    label { font-size: 13px; color:#333; }
    input, select { width:100%; padding:10px; border:1px solid #ddd; border-radius:10px; outline:none; }
    .full { grid-column: 1 / -1; }
    .items { margin-top: 14px; border:1px solid #eee; border-radius:12px; overflow:hidden; }
    .row { display:grid; grid-template-columns: 34px 1fr 120px; gap:10px; align-items:center; padding:10px 12px; border-top:1px solid #f1f1f1; }
    .row:first-child { border-top:none; background:#fafafa; font-weight:600; }
    .price { text-align:right; }
    .totalBox { display:flex; justify-content:space-between; align-items:center; margin-top:12px; padding:12px; background:#f8fafc; border:1px dashed #d7e2ff; border-radius:12px; }
    .btn { margin-top:14px; width:100%; padding:12px; border:none; border-radius:12px; background:#2563eb; color:#fff; font-size:16px; cursor:pointer; }
    .btn:disabled { opacity:.6; cursor:not-allowed; }
    .note { font-size: 12px; color:#666; margin-top:10px; }
    .status { margin-top:12px; font-size: 13px; }
    .ok { color: #0f766e; }
    .err { color: #b91c1c; }
    .preview { margin-top:8px; font-size:12px; color:#444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Participation Registration</h1>
    <p class="note">Fill details, choose activities, upload payment proof screenshot, then submit. Total updates automatically.</p>

    <form id="form">
      <div class="grid">
        <div>
          <label>Name</label>
          <input id="name" required placeholder="Your name" />
        </div>
        <div>
          <label>Class</label>
          <input id="className" required placeholder="e.g., 9th / BSCS-4" />
        </div>

        <div>
          <label>Roll Number</label>
          <input id="rollNo" required placeholder="e.g., 23-CS-101" />
        </div>
        <div>
          <label>Phone Number</label>
          <input id="phone" required placeholder="03xx-xxxxxxx" />
        </div>

        <div class="full">
          <label>Gmail</label>
          <input id="gmail" type="email" required placeholder="example@gmail.com" />
        </div>

        <div class="full items">
          <div class="row">
            <div></div>
            <div>Activity</div>
            <div class="price">Price (PKR)</div>
          </div>

          <div class="row">
            <input type="checkbox" id="painting" />
            <div>Painting</div>
            <div class="price" id="paintingPrice"></div>
          </div>

          <div class="row">
            <input type="checkbox" id="sketching" />
            <div>Sketching</div>
            <div class="price" id="sketchingPrice"></div>
          </div>

          <div class="row">
            <input type="checkbox" id="origami" />
            <div>Origami</div>
            <div class="price" id="origamiPrice"></div>
          </div>

          <div class="row">
            <input type="checkbox" id="calligraphy" />
            <div>Calligraphy</div>
            <div class="price" id="calligraphyPrice"></div>
          </div>
        </div>

        <div class="full totalBox">
          <strong>Total Bill</strong>
          <strong>Rs <span id="total">0</span></strong>
        </div>

        <div class="full">
          <label>Upload Payment Proof Screenshot</label>
          <input id="proof" type="file" accept="image/*" required />
          <div class="preview" id="fileInfo"></div>
        </div>

        <button class="btn full" id="submitBtn" type="submit">Submit Registration</button>

        <div class="status full" id="status"></div>
      </div>
    </form>
  </div>

<script>
  // 1) PASTE YOUR APPS SCRIPT WEB APP URL HERE:
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbypaoIXRFW8UNptVBaWE41p6bpnsSs6XqTVXpiDKZ0DgGaX1FTI8qCd1dWxupvL9v3t/exec";

  // Random (but reasonable) prices
  const prices = {
    painting: rand(300, 700),
    sketching: rand(250, 600),
    origami: rand(200, 500),
    calligraphy: rand(350, 800),
  };

  // Show prices on page
  document.getElementById("paintingPrice").textContent = prices.painting;
  document.getElementById("sketchingPrice").textContent = prices.sketching;
  document.getElementById("origamiPrice").textContent = prices.origami;
  document.getElementById("calligraphyPrice").textContent = prices.calligraphy;

  // Update total when checkboxes change
  ["painting","sketching","origami","calligraphy"].forEach(id => {
    document.getElementById(id).addEventListener("change", updateTotal);
  });

  // Show file info
  document.getElementById("proof").addEventListener("change", (e) => {
    const f = e.target.files[0];
    document.getElementById("fileInfo").textContent = f ? `Selected: ${f.name} (${Math.round(f.size/1024)} KB)` : "";
  });

  updateTotal();

  function rand(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }

  function updateTotal(){
    let total = 0;
    if (document.getElementById("painting").checked) total += prices.painting;
    if (document.getElementById("sketching").checked) total += prices.sketching;
    if (document.getElementById("origami").checked) total += prices.origami;
    if (document.getElementById("calligraphy").checked) total += prices.calligraphy;
    document.getElementById("total").textContent = total;
  }

  function toBase64(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  document.getElementById("form").addEventListener("submit", async (e) => {
    e.preventDefault();

    const status = document.getElementById("status");
    const btn = document.getElementById("submitBtn");
    status.textContent = "";
    status.className = "status full";

    // Must select at least 1 activity
    const selectedAny =
      painting.checked || sketching.checked || origami.checked || calligraphy.checked;

    if (!selectedAny) {
      status.textContent = "Please select at least one activity.";
      status.classList.add("err");
      return;
    }

    const proofFile = document.getElementById("proof").files[0];
    if (!proofFile) {
      status.textContent = "Please upload payment proof screenshot.";
      status.classList.add("err");
      return;
    }

    // optional file size limit (3MB)
    if (proofFile.size > 3 * 1024 * 1024) {
      status.textContent = "Screenshot is too large. Please upload under 3MB.";
      status.classList.add("err");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Submitting...";

    try {
      const proofBase64 = await toBase64(proofFile);

      const payload = {
        name: document.getElementById("name").value.trim(),
        className: document.getElementById("className").value.trim(),
        rollNo: document.getElementById("rollNo").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        gmail: document.getElementById("gmail").value.trim(),
        items: {
          painting: { selected: painting.checked, price: prices.painting },
          sketching: { selected: sketching.checked, price: prices.sketching },
          origami: { selected: origami.checked, price: prices.origami },
          calligraphy: { selected: calligraphy.checked, price: prices.calligraphy },
        },
        total: Number(document.getElementById("total").textContent),
        proofFilename: proofFile.name,
        proofMimeType: proofFile.type,
        proofBase64: proofBase64
      };

      const res = await fetch(SCRIPT_URL, {
        method: "POST",
        body: JSON.stringify(payload),
        headers: { "Content-Type": "text/plain;charset=utf-8" } // works well with Apps Script
      });

      const out = await res.json();

      if (out.ok) {
        status.innerHTML = `✅ Submitted successfully!<br>Proof saved: <a href="${out.fileUrl}" target="_blank">View file</a>`;
        status.classList.add("ok");
        document.getElementById("form").reset();
        document.getElementById("fileInfo").textContent = "";
        updateTotal();
      } else {
        status.textContent = "❌ Error: " + (out.error || "Unknown error");
        status.classList.add("err");
      }
    } catch (err) {
      status.textContent = "❌ Submit failed: " + err.message;
      status.classList.add("err");
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit Registration";
    }
  });
</script>
</body>
</html>
